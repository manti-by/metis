services:
  postgres:
    image: postgres:18
    environment:
      - POSTGRES_DB=metis
      - POSTGRES_USER=metis
      - POSTGRES_PASSWORD=metis
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=postgresql://metis:metis@postgres:5432/metis
    volumes:
      - ./backend:/app
    restart: unless-stopped
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3003:3003"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=https://metis.manti.by/api
    restart: unless-stopped
    depends_on:
      - postgres
      - backend
